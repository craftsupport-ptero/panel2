name: Deploy Pterodactyl Panel

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18'
  PHP_VERSION: '8.2'

jobs:
  # Lint and test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript checks
        run: npx tsc --noEmit

      - name: Run tests
        run: yarn test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

  # Build frontend assets
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production assets
        run: yarn build:production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: public/assets/
          retention-days: 1

  # Migration validation
  migration-test:
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pterodactyl_test
          MYSQL_USER: pterodactyl
          MYSQL_PASSWORD: pterodactyl
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test migration scripts
        run: |
          # Test database migration (dry run)
          npx ts-node --project migration/tsconfig.json migration/scripts/migrate-database.ts migrate \
            --source "mysql://pterodactyl:pterodactyl@localhost:3306/pterodactyl_test" \
            --target '{"databaseId":"test","apiToken":"test","accountId":"test"}' \
            --dry-run

      - name: Test file migration
        run: |
          # Create test files
          mkdir -p test-storage/app test-storage/logs
          echo "test file" > test-storage/app/test.txt
          
          # Test file migration (dry run)
          npx ts-node --project migration/tsconfig.json migration/scripts/migrate-files.ts migrate \
            --source test-storage \
            --dirs "app,logs" \
            --bucket test-bucket \
            --access-key test-key \
            --secret-key test-secret \
            --endpoint https://test.r2.cloudflarestorage.com \
            --dry-run

      - name: Test validation scripts
        run: |
          npx ts-node --project migration/tsconfig.json migration/scripts/validate-data.ts pre-migration \
            --source "mysql://pterodactyl:pterodactyl@localhost:3306/pterodactyl_test" \
            --files test-storage

  # Docker build and push
  docker:
    runs-on: ubuntu-latest
    needs: [build, migration-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: public/assets/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure Cloudflare credentials
        run: |
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: deployment/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: deployment/terraform
        run: |
          terraform plan \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -var="domain_name=${{ secrets.STAGING_DOMAIN }}" \
            -var="environment=staging" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: deployment/terraform
        run: terraform apply tfplan

      - name: Deploy Cloudflare Worker
        run: |
          npm install -g wrangler
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth:token
          
          # Deploy worker script
          wrangler deploy --env staging

      - name: Run post-deployment tests
        run: |
          # Wait for deployment to be ready
          sleep 30
          
          # Test API endpoints
          curl -f "https://${{ secrets.STAGING_DOMAIN }}/api/health" || exit 1
          
          # Test legacy API compatibility
          curl -f -H "Authorization: Bearer ${{ secrets.TEST_API_KEY }}" \
               "https://${{ secrets.STAGING_DOMAIN }}/api/application/users" || exit 1

  # Deploy to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure Cloudflare credentials
        run: |
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: deployment/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: deployment/terraform
        run: |
          terraform plan \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -var="domain_name=${{ secrets.PRODUCTION_DOMAIN }}" \
            -var="environment=production" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: deployment/terraform
        run: terraform apply tfplan

      - name: Deploy Cloudflare Worker
        run: |
          npm install -g wrangler
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth:token
          
          # Deploy worker script
          wrangler deploy --env production

      - name: Run smoke tests
        run: |
          # Wait for deployment to be ready
          sleep 60
          
          # Test critical endpoints
          curl -f "https://${{ secrets.PRODUCTION_DOMAIN }}/api/health" || exit 1
          curl -f "https://${{ secrets.PRODUCTION_DOMAIN }}/" || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Pterodactyl Panel deployed to production: https://${{ secrets.PRODUCTION_DOMAIN }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # Security scanning
  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: typescript, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3