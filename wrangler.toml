name = "pterodactyl-panel"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

[env.development]
name = "pterodactyl-panel-dev"
vars = { ENVIRONMENT = "development" }

[env.staging]
name = "pterodactyl-panel-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "pterodactyl-panel-prod"
vars = { ENVIRONMENT = "production" }

# D1 Database binding
[[env.development.d1_databases]]
binding = "DB"
database_name = "pterodactyl-db-dev"
database_id = ""

[[env.staging.d1_databases]]
binding = "DB"
database_name = "pterodactyl-db-staging"
database_id = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "pterodactyl-db-prod"
database_id = ""

# KV Namespace binding for caching
[[env.development.kv_namespaces]]
binding = "CACHE"
id = ""
preview_id = ""

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = ""

[[env.production.kv_namespaces]]
binding = "CACHE"
id = ""

# R2 Bucket binding for file storage
[[env.development.r2_buckets]]
binding = "STORAGE"
bucket_name = "pterodactyl-storage-dev"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "pterodactyl-storage-staging"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "pterodactyl-storage-prod"

[build]
command = "npm run build:worker"

# Development settings
[dev]
ip = "127.0.0.1"
port = 8787
local_protocol = "http"
upstream_protocol = "https"

# Build settings
[build.upload]
format = "modules"
dir = "dist"
main = "./index.js"